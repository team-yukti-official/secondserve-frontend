<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate Items | Second Serve & Second Smile</title>
    <link rel="stylesheet" href="style/heart.css">
    <link rel="stylesheet" href="style/all.css">
    <script>document.documentElement.classList.add('page-is-entering');</script>
    <link rel="stylesheet" href="style/heart-donate.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="heart-page">

    <header class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <a href="heart.html" class="logo">
                  <svg width="220" height="55" viewBox="0 0 220 55">

  <defs>
    <!-- Arrow -->
    <marker id="arrow"
            markerWidth="5"
            markerHeight="5"
            refX="4"
            refY="2.5"
            orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- LEFT TEXT -->
  <text x="85" y="35"
        text-anchor="end"
        font-family="Poppins, sans-serif"
        font-weight="800"
        font-size="20"
        fill="#ffcdd2">
    Second
  </text>

  <!-- CENTER GROUP -->
  <g transform="translate(110,28)">

    <!-- Rotating Circular Arrows -->
    <g>
      <path d="M 0 -18 A 18 18 0 0 1 18 0"
            fill="none"
            stroke="#ffffff"
            stroke-width="1.4"
            marker-end="url(#arrow)"/>

      <path d="M 0 18 A 18 18 0 0 1 -18 0"
            fill="none"
            stroke="#ffffff"
            stroke-width="1.4"
            marker-end="url(#arrow)"/>

      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0"
        to="360"
        dur="6s"
        repeatCount="indefinite"/>
    </g>

    <!-- Smaller Red Heart -->
    <path d="M0 -6
             C -7 -13, -16 -4, 0 10
             C 16 -4, 7 -13, 0 -6 Z"
          fill="#fc837f"/>
  </g>

  <!-- RIGHT TEXT -->
  <text x="135" y="35"
        text-anchor="start"
        font-family="Poppins, sans-serif"
        font-weight="800"
        font-size="20"
        fill="#ffffff">
    Smile
  </text>

</svg>
                </a>
            </div>
            <!-- Hamburger button (visible only on small viewports) -->
            <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="nav-menu" id="navMenu">
                <a href="heart.html" class="nav-link">Home</a>
                <a href="donate.html" class="nav-link">Donate Food</a>
                <a href="login.html" class="nav-link login-btn">Login</a>
                <button class="dark-mode-toggle" id="darkModeToggle" title="Toggle Dark Mode"><i
                        class="fas fa-moon"></i></button>
            </nav>
        </div>
    </header>

    <div class="heart-donate-container">
        <h2><i class="fas fa-hand-holding-heart"></i> Donate Clothes, Books & Toys</h2>
        <p class="subtitle">Share gently used clothes, educational books or toys to bring comfort and joy.</p>

        <form id="heartDonateForm">

            <div class="form-section">
                <h3><i class="fas fa-info-circle"></i> Item Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="itemType">Donation Type *</label>
                        <select id="itemType" required>
                            <option value="">-- Select Type --</option>
                            <option value="Clothes">Clothes</option>
                            <option value="Books">Books</option>
                            <option value="Toys">Toys</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="itemName">Item Name / Title *</label>
                        <input type="text" id="itemName" placeholder="e.g., Winter Jacket, Children's Story Books"
                            required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="quantity">Quantity *</label>
                        <input type="number" id="quantity" min="1" placeholder="Number of pieces/sets" required>
                    </div>
                    <div class="form-group">
                        <label for="condition">Condition *</label>
                        <select id="condition" required>
                            <option value="">-- Select Condition --</option>
                            <option value="New">New</option>
                            <option value="Good">Good</option>
                            <option value="Used">Used (clean & usable)</option>
                        </select>
                    </div>
                </div>

            </div>

            <div class="form-section">
                <h3><i class="fas fa-map-marker-alt"></i> Pickup Location</h3>
                <div class="location-btn-wrapper">
                    <button type="button" id="getCurrentLocationBtn" class="location-btn"><i
                            class="fas fa-location-dot"></i> Use My Current Location</button>
                    <div id="locationStatus" class="location-status"></div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label for="address">Pickup Address *</label>
                        <input type="text" id="address" placeholder="Building name, street address" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City *</label>
                        <input type="text" id="city" placeholder="Your city" required>
                    </div>
                    <div class="form-group">
                        <label for="pincode">Pin Code *</label>
                        <input type="text" id="pincode" placeholder="Postal code" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3><i class="fas fa-file-alt"></i> Additional Details</h3>
                <div class="form-row full">
                    <div class="form-group">
                        <label for="description">Description (Optional)</label>
                        <textarea id="description" placeholder="Sizes, age range, subjects, special notes"></textarea>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group file-upload">
                        <label for="itemImage">Photo (Recommended)</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="itemImage" accept="image/*">
                            <label for="itemImage" class="file-input-label"><i class="fas fa-cloud-upload-alt"></i>
                                Click to upload or drag and drop</label>
                        </div>
                        <p class="file-name" id="fileName"></p>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label for="contactPhone">Contact Number *</label>
                        <input type="tel" id="contactPhone" placeholder="Your phone number" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn"><i class="fas fa-check-circle"></i> Post Your Donation</button>
        </form>
    </div>

    <footer class="footer">
        <div class="section-container">
            <div class="footer-bottom">
                <p>&copy; 2026 Second Serve & Second Smile | All Rights Reserved | Recovering Hope & Sharing More</p>
            </div>
        </div>
    </footer>

    <script src="script/api-config.js"></script>
    <script src="script/api-utils.js"></script>
    <script src="script/api-extended.js"></script>
    <script src="script/auth-manager.js"></script>
    <script src="script/shared-utils.js"></script>
    <script src="script/all.js"></script>
    <script src="script/heart-donate.js"></script>
    <script>
        // Auth guard: redirect to login if not signed in
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof AuthManager !== 'undefined') {
                AuthManager.requireAuth();
            }
        });
    </script>
</body>

</html>
